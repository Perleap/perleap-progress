name: Supabase deploy

on:
  push:
    branches:
      - main
      - staging

permissions:
  contents: read

concurrency:
  group: supabase-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.92.1

      - name: Link, migrate, and deploy functions (production)
        if: github.ref == 'refs/heads/main'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}
        run: |
          supabase link --project-ref zwhnpteterkrunfevixs --password "$SUPABASE_DB_PASSWORD"
          supabase db push
          bash scripts/deploy-all-edge-functions.sh

      - name: Link, migrate, and deploy functions (staging)
        if: github.ref == 'refs/heads/staging'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}
        run: |
          supabase link --project-ref otjfoeyqiuerrgrdtgqx --password "$SUPABASE_DB_PASSWORD"
          supabase db push
          bash scripts/deploy-all-edge-functions.sh
