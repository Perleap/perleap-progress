# Global storage upload cap (must be >= bucket limits). Push with: supabase config push --project-ref <ref>
[storage]
file_size_limit = "1GiB"

[storage.buckets.syllabus-resources]
public = true
file_size_limit = "1GiB"

# Auth settings for config push — staging project (otjfoeyqiuerrgrdtgqx)
[auth]
